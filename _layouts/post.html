---
layout: default
---
<article class="post">
  {% if page.cover_image and page.cover_image != "" %}
  <div class="post-cover">
    <img src="{{ page.cover_image }}" alt="{{ page.title }}" />
  </div>
  {% endif %}
  <div class="post-header">
    <span class="post-category">{{ page.category }}</span>
    <h1>{{ page.title }}</h1>
    <time>{{ page.date | date: "%d %B %Y" }}</time>
  </div>
  <div class="post-body">
    {{ content }}
  </div>
  <a href="/" class="back-link">← All posts</a>
</article>
